<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BabyReader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-group" title="主题">
      <button class="sidebar-btn btn-theme-dark active" data-theme-btn="dark" onclick="setTheme('dark')">深</button>
      <button class="sidebar-btn btn-theme-light" data-theme-btn="light" onclick="setTheme('light')">浅</button>
      <button class="sidebar-btn btn-theme-sepia" data-theme-btn="sepia" onclick="setTheme('sepia')">护</button>
    </div>
    <div class="sidebar-group" title="宽度">
      <button class="sidebar-btn btn-width active" data-width-btn="default" onclick="setWidth('default')">默</button>
      <button class="sidebar-btn btn-width" data-width-btn="wide" onclick="setWidth('wide')">宽</button>
      <button class="sidebar-btn btn-width" data-width-btn="full" onclick="setWidth('full')">满</button>
    </div>
    <div class="sidebar-group toc-sidebar-group" id="tocSidebarGroup" title="目录" style="display:none">
      <button class="sidebar-btn btn-toc" id="tocToggleBtn" aria-label="目录" aria-expanded="false">目</button>
    </div>
  </div>

  <aside class="toc-panel" id="tocPanel" aria-label="目录" hidden>
    <div class="toc-header">
      <div class="toc-title">目录</div>
      <button class="toc-number-btn" id="tocNumberBtn" type="button" aria-pressed="false">序号</button>
    </div>
    <nav class="toc-list" id="tocList"></nav>
  </aside>

  <!-- Top bar: app name + file info + mode toggle -->
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <span class="app-name">BabyReader</span>
      <span class="file-name" id="fileName"></span>
    </div>
    <div class="topbar-right">
      <button class="path-copy-btn" id="pathCopyBtn" title="复制路径" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>
      <button class="mode-btn" id="btnReload" onclick="reloadFile()">刷新</button>
      <button class="mode-btn active" id="btnRead" onclick="setMode('read')">阅读</button>
      <button class="mode-btn" id="btnEdit" onclick="setMode('edit')">编辑</button>
    </div>
  </div>

  <!-- Hidden input for clipboard copy -->
  <input type="text" id="hiddenPathInput" style="position:fixed;left:-9999px;top:-9999px;opacity:0;" readonly>

  <!-- Reader view -->
  <div class="reader is-welcome" id="reader">
    <div class="article" id="article">
      <!-- Welcome state -->
      <div class="welcome" id="welcome">
        <h1>BabyReader</h1>
        <p class="welcome-quote-en">To acquire the habit of reading is to construct for yourself<br>a refuge from almost all the miseries of life.</p>
        <p class="welcome-quote-zh">阅读是一座随身携带的避难所。</p>
        <p class="hint">⌘O 打开文件 · 支持 .md .txt .epub · 双击直接阅读</p>
        <p class="credit">by <a href="https://x.com/KingJing001" target="_blank">@一龙小包子</a></p>
      </div>
    </div>
  </div>

  <!-- Editor view (hidden by default) -->
  <div class="editor-container" id="editorContainer" style="display:none">
    <div class="editor-pane">
      <textarea class="editor" id="editor" spellcheck="false"></textarea>
    </div>
    <div class="preview-pane">
      <div class="article" id="preview"></div>
    </div>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="lib/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
